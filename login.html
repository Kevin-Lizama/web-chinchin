<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión – Chinchintirapie</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Pacifico&family=Nunito:wght@400;600;700;800&family=Bangers&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="logo-wrap">
            <div class="logo-img">
                <img src="logo%20chinchitirapie%20.png" alt="Logo Chinchintirapie">
            </div>
            <div class="logo-text">
                <span>Chinchintirapie</span>
                <span>Escuela Carnavalera</span>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">← Volver al Inicio</a></li>
            <li><a href="registro.html" class="nav-cta nav-cta-acceso">Registrarse</a></li>
        </ul>
    </nav>

    <main class="auth-container">
        <!-- Misma caja visual del modal, como página standalone -->
        <div class="auth-modal-box auth-standalone">

            <div class="auth-modal-header">
                <img src="logo%20chinchitirapie%20.png" alt="Logo" class="auth-logo-img">
                <h1 class="auth-modal-title">Iniciar Sesión</h1>
                <p class="auth-modal-subtitle">Escuela Carnavalera</p>
            </div>

            <div class="auth-panel">
                <form class="portal-form" novalidate>
                    <div class="form-group">
                        <label for="login-email">Correo Electrónico</label>
                        <input type="email" id="login-email" placeholder="ejemplo@correo.com" autocomplete="email"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="login-pass">Contraseña</label>
                        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
                            required>
                    </div>
                    <div class="form-aux">
                        <label class="remember-label">
                            <input type="checkbox" id="login-remember"> Recordarme
                        </label>
                        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" class="portal-btn">Entrar</button>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
                </div>
            </div>

        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
